name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies (workspaces)
        run: npm install

      - name: Build (tsc) — core then java
        run: |
          npm run build --workspace=@airirang/builder-core
          npm run build --workspace=airirang-builder

      - name: Test (vitest) — airirang-builder
        run: npm test --workspace=airirang-builder

      - name: npm pack --dry-run (airirang-builder)
        working-directory: packages/java
        run: npm pack --dry-run
