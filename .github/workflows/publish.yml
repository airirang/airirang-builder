name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish (airirang-builder)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies (workspaces)
        run: npm install

      - name: Build (tsc) — core then java
        run: |
          npm run build --workspace=@airirang/builder-core
          npm run build --workspace=airirang-builder

      - name: Test (vitest) — airirang-builder
        run: npm test --workspace=airirang-builder

      - name: npm pack --dry-run (airirang-builder)
        working-directory: packages/java
        run: npm pack --dry-run

      - name: Publish airirang-builder to npm (skip if version already published)
        working-directory: packages/java
        run: |
          PKG="$(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")"
          if npm view "$PKG" version >/dev/null 2>&1; then
            echo "::notice::$PKG already published — skipping publish (idempotent)."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
