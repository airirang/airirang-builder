name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build (tsc)
        run: npm run build

      - name: Test (vitest)
        run: npm test

      - name: npm pack --dry-run
        run: npm pack --dry-run

      - name: Publish to npm (skip if version already published)
        run: |
          PKG="$(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")"
          if npm view "$PKG" version >/dev/null 2>&1; then
            echo "::notice::$PKG already published — skipping publish (idempotent)."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
