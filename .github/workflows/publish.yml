name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish (core + java + bedrock)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies (workspaces)
        run: npm install

      - name: Build (tsc) — core then editions
        run: |
          npm run build --workspace=airirang-builder-core
          npm run build --workspace=airirang-builder
          npm run build --workspace=airirang-builder-bedrock

      - name: Test (vitest) — java + bedrock
        run: |
          npm test --workspace=airirang-builder
          npm test --workspace=airirang-builder-bedrock

      # Publish order matters: core first (java/bedrock depend on it).
      # Each step is idempotent — skips if that exact version is already on npm.
      # A failed publish fails the job and stops later steps (fail-fast),
      # so a broken release never publishes editions against a missing core.
      - name: Publish airirang-builder-core
        working-directory: packages/core
        run: |
          PKG="$(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")"
          if npm view "$PKG" version >/dev/null 2>&1; then
            echo "::notice::$PKG already published — skipping (idempotent)."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish airirang-builder (Java)
        working-directory: packages/java
        run: |
          PKG="$(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")"
          if npm view "$PKG" version >/dev/null 2>&1; then
            echo "::notice::$PKG already published — skipping (idempotent)."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish airirang-builder-bedrock
        working-directory: packages/bedrock
        run: |
          PKG="$(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")"
          if npm view "$PKG" version >/dev/null 2>&1; then
            echo "::notice::$PKG already published — skipping (idempotent)."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
